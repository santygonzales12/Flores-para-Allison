<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Allison ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Fondo -->
    <div class="background">
        <div class="stars"></div>
        <div class="moon"></div>
    </div>

    <!-- Pantalla principal -->
    <main class="pantalla">

        <h1>Hola Allison ❤️</h1>

        <h2>Te amo.</h2>

        <p>
            Quería mostrarte algo que preparé especialmente para ti...
        </p>

        <button id="boton" onclick="iniciarSorpresa()">
            Abrir mi sorpresa 💌
        </button>

        <!-- Cuenta regresiva -->
        <div id="contador"></div>

        <!-- Flores -->
        <section id="flores" class="oculto">

            <div class="girasol"></div>
            <div class="girasol"></div>
            <div class="girasol"></div>

        </section>

        <!-- Carta -->
        <section id="carta" class="oculto">

            <div class="papel">

                <h2>💌 Para Allison</h2>

                <p id="texto"></p>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
